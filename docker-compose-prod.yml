services:
  radcliffe-web:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: ${REGISTRY_HOST}/radcliffe-web
    container_name: radcliffe-web
    ports:
      - "3007:3007"
    environment:
      NODE_ENV: production
      PORT: "3007"
      DATABASE_URL: postgres://radcliffe:radcliffe@radcliffe-db:5432/radcliffe
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: radcliffe
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
    depends_on:
      - radcliffe-db
    restart: always
    env_file: ./.env.production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3007/api/content >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5

  radcliffe-db:
    image: postgres:16-alpine
    container_name: radcliffe-db
    environment:
      POSTGRES_DB: radcliffe
      POSTGRES_USER: radcliffe
      POSTGRES_PASSWORD: radcliffe
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - radcliffe-db-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radcliffe -d radcliffe"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  radcliffe-db-data:
