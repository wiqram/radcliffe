<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Redcliffe CMS Login</title>
<link rel="stylesheet" href="/admin/assets/admin.css?v=20260619-editor-ui" />
<link rel="icon" type="image/png" href="/images/favicon.png" />
<link rel="apple-touch-icon" href="/images/favicon.png" />
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card">
      <img class="login-logo" src="/images/redcliffe-logo.webp" width="126" height="35" alt="Redcliffe Advisory" />
      <p class="eyebrow">Redcliffe Advisory</p>
      <h1>CMS Login</h1>
      <form method="post" action="/admin/login">
        <label>
          <span>Username</span>
          <input name="username" autocomplete="username" required autofocus />
        </label>
        <label>
          <span>Password</span>
          <input name="password" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit">Sign in</button>
      </form>
    </section>
  </main>
</body>
</html>
