apiVersion: v1
kind: Secret
metadata:
  name: radcliffe-app-secret
  namespace: radcliffe
  labels:
    app.kubernetes.io/part-of: radcliffe
type: Opaque
stringData:
  POSTGRES_DB: radcliffe
  POSTGRES_USER: radcliffe
  POSTGRES_PASSWORD: radcliffe
  DATABASE_URL: postgres://radcliffe:radcliffe@radcliffe-db:5432/radcliffe
  ADMIN_USERNAME: admin
  ADMIN_PASSWORD: radcliffe
  SESSION_SECRET: change-me-in-production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radcliffe-web
  namespace: radcliffe
  labels:
    app: radcliffe-web
    app.kubernetes.io/name: radcliffe-web
    app.kubernetes.io/part-of: radcliffe
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: radcliffe-web
  template:
    metadata:
      labels:
        app: radcliffe-web
        app.kubernetes.io/name: radcliffe-web
        app.kubernetes.io/part-of: radcliffe
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: radcliffe-web
          image: container-registry.traderyolo.com/radcliffe-web
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3007
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3007"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: radcliffe-app-secret
                  key: DATABASE_URL
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: radcliffe-app-secret
                  key: ADMIN_USERNAME
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: radcliffe-app-secret
                  key: ADMIN_PASSWORD
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: radcliffe-app-secret
                  key: SESSION_SECRET
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/content
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/content
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: radcliffe-web
  namespace: radcliffe
  labels:
    app: radcliffe-web
spec:
  type: NodePort
  selector:
    app: radcliffe-web
  ports:
    - name: http
      nodePort: 30070
      port: 3007
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: radcliffe-db
  namespace: radcliffe
  labels:
    app: radcliffe-db
    app.kubernetes.io/name: radcliffe-db
    app.kubernetes.io/part-of: radcliffe
spec:
  clusterIP: None
  selector:
    app: radcliffe-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: radcliffe-db
  namespace: radcliffe
  labels:
    app: radcliffe-db
    app.kubernetes.io/name: radcliffe-db
    app.kubernetes.io/part-of: radcliffe
spec:
  serviceName: radcliffe-db
  replicas: 1
  selector:
    matchLabels:
      app: radcliffe-db
  template:
    metadata:
      labels:
        app: radcliffe-db
        app.kubernetes.io/name: radcliffe-db
        app.kubernetes.io/part-of: radcliffe
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: radcliffe-app-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: radcliffe-app-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: radcliffe-app-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "radcliffe", "-d", "radcliffe"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "radcliffe", "-d", "radcliffe"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: radcliffe-web
  namespace: radcliffe
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: radcliffe.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: radcliffe-web
                port:
                  number: 3007
  tls:
    - hosts:
        - radcliffe.example.com
      secretName: radcliffe-web-tls
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: radcliffe-web
  namespace: radcliffe
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: radcliffe-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
